[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_PUBLIC_USE_MOCK_DB = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production]
  [context.production.environment]
    NEXT_PUBLIC_SITE_URL = "https://trial-finder-demo.netlify.app"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NEXT_PUBLIC_SITE_URL = "https://deploy-preview--trial-finder-demo.netlify.app"
