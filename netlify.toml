[build]
  command = "rm -rf .next dist && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Auto-enable mock mode for demo deployments without DB
  NEXT_PUBLIC_USE_MOCK_DB = "true"

# Don't redirect API routes - they return 404
[[redirects]]
  from = "/api/*"
  to = "/404.html"
  status = 404

# All other pages are statically generated - no SPA fallback needed
# The static files are served directly

[context.production]
  [context.production.environment]
    NEXT_PUBLIC_SITE_URL = "https://trial-finder-demo.netlify.app"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NEXT_PUBLIC_SITE_URL = "https://deploy-preview--trial-finder-demo.netlify.app"
